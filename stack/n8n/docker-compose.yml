services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    environment:
      N8N_HOST: "localhost" # Set to your domain
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http" # Use "http" for local access
      WEBHOOK_URL: "http://localhost:5678/" # Your public URL for webhooks
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "n8n-postgres"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "${N8N_POSTGRES_DB}"
      DB_POSTGRESDB_USER: "${N8N_POSTGRES_USER}"
      DB_POSTGRESDB_PASSWORD: "${N8N_POSTGRES_PASSWORD}"
      N8N_SECURE_COOKIE: "${N8N_SECURE_COOKIE}"
      GENERIC_TIMEZONE: "${TZ}"
    volumes:
      - ../../local-volumes/n8n/data:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  n8n-postgres:
    image: pgvector/pgvector:pg17
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${N8N_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${N8N_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${N8N_POSTGRES_DB}"
    volumes:
      - ../../local-volumes/n8n/postgresql/data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${N8N_POSTGRES_USER}", "-d", "${N8N_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
