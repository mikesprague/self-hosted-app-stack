services:
  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:latest
    container_name: karakeep-chrome
    restart: unless-stopped
    ports:
      - 9222:9222
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    deploy:
      resources:
        limits:
          memory: 5000M

  karakeep-meilisearch:
    image: getmeili/meilisearch:latest
    container_name: karakeep-meilisearch
    restart: unless-stopped
    ports:
      - 7700:7700
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 250M
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${KARAKEEP_MEILI_MASTER_KEY}
    volumes:
      - ../../local-volumes/karakeep/meilisearch:/meili_data

  karakeep-web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep-web
    deploy:
      resources:
        limits:
          memory: 750M
    restart: unless-stopped
    depends_on:
      karakeep-chrome:
        condition: service_started
      karakeep-meilisearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "${KARAKEEP_PORT:-7788}:3000"
    environment:
      MEILI_ADDR: http://karakeep-meilisearch:7700
      MEILI_MASTER_KEY: ${KARAKEEP_MEILI_MASTER_KEY}
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data # DON'T CHANGE THIS
      NEXTAUTH_URL: http://localhost:7788
      NEXTAUTH_SECRET: ${KARAKEEP_NEXTAUTH_SECRET}
      DISABLE_SIGNUPS: ${KARAKEEP_DISABLE_SIGNUPS:-false}
      SMTP_HOST: ${KARAKEEP_SMTP_HOST:-}
      SMTP_PORT: ${KARAKEEP_SMTP_PORT:-}
      SMTP_SECURE: ${KARAKEEP_SMTP_SECURE:-false}
      SMTP_USER: ${KARAKEEP_SMTP_USER:-}
      SMTP_PASSWORD: ${KARAKEEP_SMTP_PASSWORD:-}
      SMTP_FROM: ${KARAKEEP_SMTP_FROM:-}
      # OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      # OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      # OLLAMA_KEEP_ALIVE: ${KARAKEEP_OLLAMA_KEEP_ALIVE:-5m}
      OPENAI_API_KEY: ${LITELLM_API_KEY}
      OPENAI_BASE_URL: ${LITELLM_API_URL}
      INFERENCE_TEXT_MODEL: ${KARAKEEP_INFERENCE_TEXT_MODEL:-gpt-5.4-mini}
      INFERENCE_IMAGE_MODEL: ${KARAKEEP_INFERENCE_IMAGE_MODEL:-gpt-5.4-mini}
      EMBEDDING_TEXT_MODEL: ${KARAKEEP_EMBEDDING_TEXT_MODEL:-text-embedding-3-small}
      INFERENCE_USE_MAX_COMPLETION_TOKENS: ${KARAKEEP_INFERENCE_USE_MAX_COMPLETION_TOKENS:-false}
      INFERENCE_NUM_WORKERS: ${KARAKEEP_INFERENCE_NUM_WORKERS:-1}
      INFERENCE_ENABLE_AUTO_SUMMARIZATION: ${KARAKEEP_INFERENCE_ENABLE_AUTO_SUMMARIZATION:-true}
      INFERENCE_JOB_TIMEOUT_SEC: ${KARAKEEP_INFERENCE_JOB_TIMEOUT_SEC:-90}
    volumes:
      - ../../local-volumes/karakeep/data:/data
