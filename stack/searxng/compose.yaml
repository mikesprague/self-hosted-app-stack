services:
  searxng-valkey:
    image: valkey/valkey:9-alpine
    container_name: searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - ../../local-volumes/searxng/valkey:/data/
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    depends_on:
      searxng-valkey:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT}:8080"
    environment:
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY}"
    volumes:
      - ../../local-volumes/searxng:/etc/searxng:rw
      - ../../local-volumes/searxng/cache:/var/cache/searxng:rw
    healthcheck:
      test: [ "CMD", "wget", "--spider", "--quiet", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
