services:
  postgres-migrate:
    image: postgres:17-alpine
    container_name: postgres-migrate
    restart: "no"
    profiles:
      - migrate
    environment:
      POSTGRES_SHARED_HOST: "postgres-shared"
      POSTGRES_SHARED_PORT: "5432"
      POSTGRES_SHARED_SUPERUSER: "${POSTGRES_SHARED_SUPERUSER}"
      POSTGRES_SHARED_SUPERUSER_PASSWORD: "${POSTGRES_SHARED_SUPERUSER_PASSWORD}"
      PG_MIGRATIONS: "${PG_MIGRATIONS}"
    volumes:
      - ../../local-volumes/postgres-migrate/scripts:/scripts:ro
    command: [ "/scripts/run-migrations.sh" ]
