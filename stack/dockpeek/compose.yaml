services:
  dockpeek:
    image: dockpeek/dockpeek:latest
    container_name: dockpeek
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SECRET_KEY: "${DOCKPEEK_SECRET_KEY}"
      USERNAME: "${DOCKPEEK_USERNAME}"
      PASSWORD: "${DOCKPEEK_PASSWORD}"
      # Server name for UI (optional, auto-detected from Docker API if not set)
      # DOCKER_HOST_NAME:
    ports:
      - "${DOCKPEEK_PORT:-8368}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
