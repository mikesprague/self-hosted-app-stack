services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    ports:
      - '${FRESHRSS_PUBLISHED_PORT:-8353}:80'
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres-shared:
        condition: service_healthy
    logging:
      options:
        max-size: 10m
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "cli/health.php" ]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3
    volumes:
      - ../../local-volumes/freshrss/app/data:/var/www/FreshRSS/data
      - ../../local-volumes/freshrss/app/extensions:/var/www/FreshRSS/extensions
    environment:
      TZ: "${TZ:-America/New_York}"
      CRON_MIN: '1,31'
      ADMIN_EMAIL: "${FRESHRSS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${FRESHRSS_ADMIN_PASSWORD}"
      ADMIN_API_PASSWORD: "${FRESHRSS_ADMIN_API_PASSWORD}"
      PUBLISHED_PORT: "${FRESHRSS_PUBLISHED_PORT:-8353}"
      DB_HOST: "postgres-shared"
