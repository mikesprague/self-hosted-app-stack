services:
  atlassian-mcp:
    image: mcp/atlassian:latest
    container_name: atlassian-mcp
    restart: unless-stopped
    command: [ "--transport", "streamable-http", "--port", "9000" ]
    environment:
      TRANSPORT: streamable-http
      HOST: 0.0.0.0
      PORT: 9000
      READ_ONLY_MODE: "${ATLASSIAN_READ_ONLY_MODE:-false}"
      JIRA_URL: "${JIRA_URL}"
      JIRA_PERSONAL_TOKEN: "${JIRA_PERSONAL_TOKEN}"
      CONFLUENCE_URL: "${CONFLUENCE_URL}"
      CONFLUENCE_PERSONAL_TOKEN: "${CONFLUENCE_PERSONAL_TOKEN}"
    ports:
      - "${ATLASSIAN_MCP_PORT:-9000}:9000"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
