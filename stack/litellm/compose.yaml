services:
  litellm:
    image: litellm/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    deploy:
      resources:
        limits:
          memory: 2048M
    depends_on:
      postgres-shared:
        condition: service_healthy
      atlassian-mcp:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY}"
      DATABASE_URL: "postgresql://${LITELLM_POSTGRES_USER}:${LITELLM_POSTGRES_PASSWORD}@postgres-shared:5432/${LITELLM_POSTGRES_DB}"
      STORE_MODEL_IN_DB: "${LITELLM_STORE_MODEL_IN_DB:-False}"
      OLLAMA_API_BASE: "${OLLAMA_BASE_URL}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY}"
      AZURE_API_KEY: "${AZURE_OPENAI_API_KEY}"
      AZURE_API_BASE: "${AZURE_FOUNDRY_BASE_URL}"
      AZURE_FOUNDRY_BASE_URL: "${AZURE_FOUNDRY_BASE_URL}"
      AZURE_API_VERSION: "${AZURE_OPENAI_API_VERSION}"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
      TDX_MCP_SERVER_URL: "${TDX_MCP_SERVER_URL}"
      SEARXNG_API_BASE: "${SEARXNG_BASE_URL}"
    volumes:
      - ../../local-volumes/litellm/config/config.yaml:/app/config/config.yaml:ro
    command:
      - "--config=/app/config/config.yaml"
      - "--port=4000"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
