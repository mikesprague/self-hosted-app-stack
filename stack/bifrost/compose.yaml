services:
  bifrost-qdrant:
    image: qdrant/qdrant:latest
    container_name: bifrost-qdrant
    ports:
      - "${BIFROST_QDRANT_REST_PORT:-6333}:6333" # REST API
      - "${BIFROST_QDRANT_GRPC_PORT:-6334}:6334" # gRPC API (optional)
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      QDRANT__LOG_LEVEL: "${BIFROST_QDRANT_LOG_LEVEL:-info}"
      QDRANT__STORAGE__PATH: "/qdrant/storage"
      QDRANT__STORAGE__USE_S3: "false"
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - ../../local-volumes/bifrost/cache/qdrant:/qdrant/storage
      # - ../../local-volumes/bifrost/qdrant/config.yaml:/qdrant/config.yaml
    restart: unless-stopped

  bifrost:
    image: maximhq/bifrost:v1.5.0-prerelease8
    container_name: bifrost
    ports:
      - "${BIFROST_APP_PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      bifrost-qdrant:
        condition: service_started
    environment:
      APP_HOST: "${BIFROST_APP_HOST:-0.0.0.0}"
      LOG_LEVEL: "${BIFROST_LOG_LEVEL:-debug}"
      LOG_STYLE: "${BIFROST_LOG_STYLE:-json}"
      AZURE_ENDPOINT: "${AZURE_FOUNDRY_BASE_URL}"
      AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY}"
      OLLAMA_URL: "${OLLAMA_BASE_URL}"
      OLLAMA_ENDPOINT: "${OLLAMA_BASE_URL}"
      ATLASSIAN_MCP_SERVER_URL: "http://atlassian:9000/mcp"
      TDX_MCP_SERVER_URL: "${TDX_MCP_SERVER_URL}"
      CONTEXT7_MCP_SERVER_URL: "https://mcp.context7.com/mcp"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
      MERMAID_MCP_SERVER_URL: "https://mcp.mermaid.ai/mcp"
    volumes:
      - ../../local-volumes/bifrost/data:/app/data
    restart: unless-stopped
