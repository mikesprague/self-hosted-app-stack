services:
  siyuan:
    image: b3log/siyuan:latest
    container_name: siyuan
    volumes:
      - ../../local-volumes/siyuan/workspace:/siyuan/workspace
    ports:
      - "${SIYUAN_PORT:-6806}:6806"
    environment:
      PUID: "1000"
      PGID: "1000"
    command:
      - --workspace=/siyuan/workspace/
      - --accessAuthCode=${SIYUAN_ACCESS_CODE}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
