services:
  affine-redis:
    image: redis:8-alpine
    container_name: affine-redis
    command:
      - redis-server
      - --maxmemory 225mb # a bit under container limit so you leave room for Redis overhead
      - --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  affine-migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine-migration-job
    volumes:
      - ../../local-volumes/affine/storage:/root/.affine/storage
      - ../../local-volumes/affine/config:/root/.affine/config
    command: [ "sh", "-c", "node ./scripts/self-host-predeploy.js" ]
    environment:
      REDIS_SERVER_HOST: affine-redis
      DATABASE_URL: "postgresql://${AFFINE_POSTGRES_USER}:${AFFINE_POSTGRES_PASSWORD}@postgres-shared:5432/${AFFINE_POSTGRES_DB}"
    depends_on:
      postgres-shared:
        condition: service_healthy
      affine-redis:
        condition: service_healthy

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine-server
    ports:
      - '${AFFINE_PORT:-3010}:3010'
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      affine-redis:
        condition: service_healthy
      postgres-shared:
        condition: service_healthy
      affine-migration:
        condition: service_completed_successfully
    volumes:
      - ../../local-volumes/affine/storage:/root/.affine/storage
      - ../../local-volumes/affine/config:/root/.affine/config
    environment:
      selfhosted: true
      REDIS_SERVER_HOST: affine-redis
      DATABASE_URL: "postgresql://${AFFINE_POSTGRES_USER}:${AFFINE_POSTGRES_PASSWORD}@postgres-shared:5432/${AFFINE_POSTGRES_DB}"
      CONFIG_LOCATION: "/root/.affine/config"
    restart: unless-stopped
