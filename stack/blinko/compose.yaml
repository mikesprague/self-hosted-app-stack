services:
  blinko-web:
    image: blinkospace/blinko:latest
    container_name: blinko-web
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: "http://${TAILNET_IP_ADDRESS}:${BLINKO_PORT:-1111}"
      NEXT_PUBLIC_BASE_URL: "http://${TAILNET_IP_ADDRESS}:${BLINKO_PORT:-1111}"
      NEXTAUTH_SECRET: "${BLINKO_NEXTAUTH_SECRET:?missing}"
      DATABASE_URL: postgresql://${BLINKO_POSTGRES_USER}:${BLINKO_POSTGRES_PASSWORD}@postgres-shared:5432/${BLINKO_POSTGRES_DB}
    depends_on:
      postgres-shared:
        condition: service_healthy
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${BLINKO_PORT:-1111}:1111"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://${TAILNET_IP_ADDRESS}:${BLINKO_PORT:-1111}/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ../../local-volumes/blinko/data:/app/.blinko
